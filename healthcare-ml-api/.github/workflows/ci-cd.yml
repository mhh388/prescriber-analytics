name: Healthcare ML API — CI/CD Pipeline

# Agile delivery: run on every push to main (continuous integration)
# and deploy on merge to main (continuous deployment)
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Sprint 1: Test ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  # ── Sprint 2: Build Docker image ───────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test           # Only build if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t healthcare-ml-api:${{ github.sha }} .
          docker build -t healthcare-ml-api:latest .

      - name: Test Docker image
        run: |
          docker run -d --name test-api -p 8000:8000 healthcare-ml-api:latest
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api

      - name: Save image artifact
        run: docker save healthcare-ml-api:latest | gzip > healthcare-ml-api.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: healthcare-ml-api.tar.gz
          retention-days: 1

  # ── Sprint 3: Deploy to Kubernetes ─────────────────────────
  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubectl
        run: |
          # In production: use secrets to configure kubeconfig
          echo "Deploying to Kubernetes cluster..."
          echo "Commit: ${{ github.sha }}"

      - name: Update deployment image
        run: |
          # Update the image tag in deployment
          sed -i "s|healthcare-ml-api:latest|healthcare-ml-api:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/healthcare-ml-api --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -l app=healthcare-ml-api
          kubectl get services healthcare-ml-api-service

      - name: Post deployment summary
        run: |
          echo "✅ Deployment complete"
          echo "📦 Image: healthcare-ml-api:${{ github.sha }}"
          echo "🌐 Replicas: $(kubectl get deployment healthcare-ml-api -o jsonpath='{.status.readyReplicas}')"
